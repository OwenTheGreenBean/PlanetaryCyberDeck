; PlatformIO — Planet Weather Scanner (ESP32-C3)
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = dfrobot_beetle_esp32c3

[env:dfrobot_beetle_esp32c3]
platform = espressif32
board = dfrobot_beetle_esp32c3
framework = arduino
monitor_speed = 115200
extra_scripts = pre:extra_scripts/fix_tft_espi_c3.py

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    -include include/User_Setup.h
    -DCORE_DEBUG_LEVEL=0
    -DADC_ONESHOT_FORCE_USE_ADC2_ON_C3=1

; Generic ESP32-C3 env (if not using DFRobot Beetle)
[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
build_flags =
    -include include/User_Setup.h

; Quick TFT wiring / color test — upload: pio run -e screen_test -t upload
[env:screen_test]
extends = env:dfrobot_beetle_esp32c3
build_src_filter = -<*> +<../test/screen/main.cpp>
